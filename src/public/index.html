<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kronos | Gestão</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&family=Inter:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">

      <!-- HEADER -->
      <header class="topbar">
        <div class="brand">
          <span class="eyebrow">Sistema Kronos</span>
          <h1>Gestão <span class="gold">Operacional</span></h1>
        </div>
        <button class="btn-primary" id="addTaskBtn" type="button">+ Adicionar</button>
      </header>

      <!-- MÉTRICAS -->
      <section class="metrics" id="metricsBar" aria-label="Resumo">
        <div class="metric-card" data-list="Tarefa" id="metricTarefa">
          <span class="metric-label">Tarefas</span>
          <span class="metric-count" id="countTarefa">—</span>
          <span class="metric-sub" id="subTarefa">carregando</span>
        </div>
        <div class="metric-card" data-list="Backlog" id="metricBacklog">
          <span class="metric-label">Backlog</span>
          <span class="metric-count" id="countBacklog">—</span>
          <span class="metric-sub" id="subBacklog">itens aguardando</span>
        </div>
        <div class="metric-card" data-list="Ideia" id="metricIdeia">
          <span class="metric-label">Ideias</span>
          <span class="metric-count" id="countIdeia">—</span>
          <span class="metric-sub" id="subIdeia">capturadas</span>
        </div>
        <div class="metric-card metric-progress">
          <span class="metric-label">Progresso</span>
          <div class="progress-ring-wrap">
            <svg class="progress-ring" viewBox="0 0 64 64">
              <circle class="ring-bg" cx="32" cy="32" r="26"/>
              <circle class="ring-fill" id="progressRing" cx="32" cy="32" r="26"/>
            </svg>
            <span class="ring-pct" id="progressPct">0%</span>
          </div>
          <span class="metric-sub" id="progressSub">concluídas</span>
          <div class="metric-extra" id="metricExtra"></div>
        </div>
      </section>

      <!-- DISTRIBUIÇÃO -->
      <section class="dist-bar" id="distBar" aria-label="Distribuição por empresa"></section>

      <!-- TOOLBAR -->
      <section class="toolbar" aria-label="Filtros">
        <nav class="tabs" aria-label="Listas">
          <button class="tab active" data-list="Tarefa" type="button">
            Tarefas <span class="tab-badge" id="tabBadgeTarefa"></span>
          </button>
          <button class="tab" data-list="Backlog" type="button">
            Backlog <span class="tab-badge" id="tabBadgeBacklog"></span>
          </button>
          <button class="tab" data-list="Ideia" type="button">
            Ideias <span class="tab-badge" id="tabBadgeIdeia"></span>
          </button>
          <button class="tab tab-concluidas" data-list="Concluida" type="button">
            ✓ Concluídas <span class="tab-badge" id="tabBadgeConcluida"></span>
          </button>
        </nav>

        <div class="filters" id="mainFilters">
          <label>
            Empresa
            <select id="companyFilter">
              <option value="">Todas</option>
              <option>IbogaLiv</option>
              <option>Olympus</option>
              <option>PlugAI</option>
              <option>Pessoal</option>
            </select>
          </label>
          <label>
            Impacto
            <select id="impactFilter">
              <option value="">Todos</option>
              <option>Alto</option>
              <option>Médio</option>
              <option>Baixo</option>
            </select>
          </label>
        </div>
      </section>

      <!-- LEGENDA -->
      <div class="urgency-legend" id="urgencyLegend">
        <span><i class="dot dot-fresh"></i> Recente (&lt;3d)</span>
        <span><i class="dot dot-warn"></i> Atenção (3–7d)</span>
        <span><i class="dot dot-old"></i> Urgente (&gt;7d)</span>
      </div>

      <!-- BOARD -->
      <section class="board" id="taskBoard" aria-live="polite"></section>

    </main>

    <!-- MODAL TAREFA -->
    <dialog id="taskModal">
      <form class="modal" id="taskForm" method="dialog">
        <div class="modal-head">
          <h2 id="modalTitle">Nova tarefa</h2>
          <button class="btn-icon" id="closeModalBtn" type="button" aria-label="Fechar">✕</button>
        </div>

        <input type="hidden" id="taskId" />

        <label>
          Título
          <input id="titleInput" required maxlength="160" placeholder="Descreva a tarefa..." />
        </label>

        <div class="grid-2">
          <label>
            Empresa
            <select id="companyInput">
              <option>IbogaLiv</option>
              <option>Olympus</option>
              <option>PlugAI</option>
              <option>Pessoal</option>
            </select>
          </label>
          <label>
            Impacto
            <select id="impactInput">
              <option>Alto</option>
              <option selected>Médio</option>
              <option>Baixo</option>
            </select>
          </label>
        </div>

        <div class="grid-2">
          <label>
            Lista
            <select id="listInput">
              <option>Tarefa</option>
              <option>Backlog</option>
              <option>Ideia</option>
            </select>
          </label>
          <label>
            Status
            <select id="statusInput">
              <option>A fazer</option>
              <option>Em andamento</option>
              <option>Concluída</option>
              <option>Pausada</option>
            </select>
          </label>
        </div>

        <label>
          Notas
          <textarea id="notesInput" rows="3" placeholder="Observações, contexto, links..."></textarea>
        </label>

        <!-- SUBTAREFAS -->
        <div class="subtasks-section" id="subtasksSection">
          <div class="subtasks-header">
            <span class="detail-label">Subtarefas</span>
            <span class="subtasks-count" id="subtasksCount"></span>
          </div>
          <ul class="subtask-list" id="subtaskList"></ul>
          <div class="subtask-add">
            <input id="newSubtaskInput" placeholder="Nova subtarefa..." maxlength="160" />
            <button class="btn-add-sub" type="button" id="addSubtaskBtn">+</button>
          </div>
        </div>

        <section class="detail" id="taskDetail" hidden>
          <div class="detail-row">
            <span class="detail-label">Tempo total</span>
            <strong id="totalTime">-</strong>
          </div>
          <div class="detail-row">
            <span class="detail-label">Histórico</span>
            <ul id="historyList"></ul>
          </div>
        </section>

        <div class="modal-actions">
          <button class="btn-danger" id="deleteBtn" type="button" hidden>Excluir</button>
          <button class="btn-secondary" id="cancelBtn" type="button">Cancelar</button>
          <button class="btn-primary" type="submit">Salvar</button>
        </div>
      </form>
    </dialog>

    <script src="/app.js"></script>
  </body>
</html>
